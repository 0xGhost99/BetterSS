settings:
  ss-world: "betterss"
  max-ss-time: 600
  message-interval: 5
  block-inventory: true
  auto-ban-on-logout: true
  ban-reason-logout: "&c[BetterSS] Bannato per logout durante ScreenShare."
  ban-reason-manual: "&c[BetterSS] Bannato per uso di cheat durante ScreenShare."
  ban-duration: -1
  discord-link: "https://discord.gg/tuoserver"
  discord-webhook: ""
  enable-logs: true

scoreboard:
  title: "&c&lSCREENSHARE"
  lines:
    - "&r"
    - "&7Sei in un controllo SS"
    - "&7Rispondi allo staff"
    - "&7Ammetti se usi cheat"
    - "&7Entra nel Discord SS"
    - "&e{discord}"
    - "&r"
    - "&7Player: &c{player}"
    - "&7Staff: &a{staff}"
    - "&r"
    - "&7Tempo: &f{time}"
    - "&r"

auto-messages:
  - "&c[SS] &7Sei sotto ScreenShare. Coopera con lo staff!"
  - "&c[SS] &7Non disconnetterti o verrai bannato automaticamente."
  - "&c[SS] &7Entra nel Discord nella sezione ScreenShare."
  - "&c[SS] &7Ammetti se stai usando programmi non consentiti."
  - "&c[SS] &7Il tuo PC verra controllato dallo staff."

messages:
  prefix: "&8[&c&lSS&8] &r"
  ss-started: "&aScreenShare avviata su &e{player}&a."
  ss-already-active: "&cUna SS e gia attiva su &e{player}&c!"
  ss-not-active: "&cNessuna SS attiva su &e{player}&c."
  ss-ended: "&aScreenShare su &e{player} &aterminata."
  ss-banned: "&cPlayer &e{player} &cbannato per ScreenShare."
  ss-frozen: "&aPlayer &e{player} &afreezeato."
  ss-unfrozen: "&aPlayer &e{player} &adefreezeato."
  ss-discord-sent: "&aLink Discord inviato a &e{player}&a."
  ss-status-active: "&aSS su &e{player}&a: &2ATTIVA &7(Staff: &f{staff}&7, Tempo: &f{time}s&7)"
  ss-status-none: "&cNessuna SS attiva su &e{player}&c."
  ss-max-time: "&cTempo SS scaduto per &e{player}&c. SS terminata automaticamente."
  player-frozen: "&c&lSei stato freezato! &r&cNon muoverti e non disconnetterti."
  player-unfrozen: "&aVieni defreezeato. Puoi muoverti di nuovo."
  player-command-blocked: "&cNon puoi usare comandi durante la ScreenShare!"
  player-movement-blocked: "&cSei freezato! Non puoi muoverti."
  player-discord: "&6[SS] &eEntra nel Discord SS: &b{discord}"
  player-not-found: "&cPlayer &e{player} &cnon trovato o non in gioco."
  no-permission: "&cNon hai i permessi per eseguire questo comando."
  usage-main: "&cUso: /ss <player> | /ss <freeze|unfreeze|clean|ban|discord|status> <player>"